name: Build & Upload to TestFlight — CI pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ASC_KEY: ${{ secrets.ASC_KEY }}
  ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
  ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
  BUNDLE_ID: com.yeziddr.morningvault.dev
  APP_ID: ${{ secrets.APP_ID }}

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump build number
        run: |
          NEXT=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEXT/" MorningVault.xcodeproj/project.pbxproj || true
          echo "Build number set to: $NEXT"

      - name: Resolve SPM dependencies
        run: xcodebuild -project MorningVault.xcodeproj -scheme MorningVault -resolvePackageDependencies

      - name: Build for App Store (Archive)
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MorningVault.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="${{ secrets.APP_STORE_CONNECT_TEAM_ID }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .ipa
        run: |
          cat > build/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/MorningVault.xcarchive \
            -exportPath build \
            -exportOptionsPlist build/exportOptions.plist \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="${{ secrets.APP_STORE_CONNECT_TEAM_ID }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload to TestFlight
        run: |
          # Write p8 key to file (single line, no newlines)
          printf '%s' "$ASC_KEY" > /tmp/auth_key.p8

          # Upload to App Store Connect using altool with API key auth
          xcrun altool --upload-app \
            -t ios \
            -f build/MorningVault.ipa \
            --apiKeyId "$ASC_KEY_ID" \
            --apiKeyPath /tmp/auth_key.p8 \
            --issuerId "$ASC_ISSUER_ID" \
            --type ios \
            2>&1

      - name: Verify Upload
        if: always()
        run: |
          # Give App Store Connect a moment to process the upload
          sleep 10
          echo "Build uploaded. Check App Store Connect > TestFlight > Builds for status."