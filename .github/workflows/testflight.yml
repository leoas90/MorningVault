name: Build & Upload to TestFlight — CI pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ASC_KEY: ${{ secrets.ASC_KEY }}
  ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
  ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
  BUNDLE_ID: com.yeziddr.morningvault.dev
  APP_ID: ${{ secrets.APP_ID }}

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump build number
        run: |
          NEXT=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEXT/" MorningVault.xcodeproj/project.pbxproj || true
          echo "Build number set to: $NEXT"

      - name: Resolve SPM dependencies
        run: xcodebuild -project MorningVault.xcodeproj -scheme MorningVault -resolvePackageDependencies

      - name: Build for App Store (Archive)
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MorningVault.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA manually
        run: |
          ARCHIVE="build/MorningVault.xcarchive"
          APP="$ARCHIVE/Products/Applications/MorningVault.app"

          # Verify .app exists in archive
          ls "$APP" || exit 1

          # Create Payload directory and copy .app
          mkdir -p Payload
          cp -R "$APP" Payload/MorningVault.app

          # Create the IPA (just a zip of Payload)
          rm -f build/MorningVault.ipa
          cd Payload
          zip -r ../build/MorningVault.ipa MorningVault.app
          cd ..

          echo "IPA created:"
          ls -lh build/MorningVault.ipa

      - name: Upload to TestFlight
        run: |
          # Write private key to file with proper newlines (PEM format)
          echo "$ASC_KEY" > /tmp/auth_key.p8

          # Debugging: Print out paths and variables for clarity
          echo "Using API Key ID: $ASC_KEY_ID"
          echo "Using Issuer ID: $ASC_ISSUER_ID"
          echo "Auth Key Path: /tmp/auth_key.p8"
          echo "Auth Key first 20 chars: $(head -c 20 /tmp/auth_key.p8)"

          # Execute TestFlight upload
          xcrun altool --upload-app \
            --type ios \
            --file build/MorningVault.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            2>&1

      - name: Verify Upload
        if: always()
        run: |
          sleep 10
          echo "Build uploaded. Check App Store Connect > TestFlight > Builds."