name: Build & Upload to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
  ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
  BUNDLE_ID: com.yeziddr.morningvault.dev
  APP_ID: ${{ secrets.APP_ID }}

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build for App Store (Archive)
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MorningVault.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MorningVault.xcarchive \
            -exportPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload to TestFlight
        env:
          ASC_KEY: ${{ secrets.ASC_KEY }}
        run: |
          # Write p8 key to file (single line, no newlines)
          printf '%s' "$ASC_KEY" > /tmp/auth_key.p8

          # Upload to App Store Connect using altool with API key auth
          xcrun altool --upload-app \
            -t ios \
            -f build/MorningVault.ipa \
            --apiKeyId "$ASC_KEY_ID" \
            --apiKeyPath /tmp/auth_key.p8 \
            --issuerId "$ASC_ISSUER_ID" \
            --type bundle \
            2>&1

      - name: Verify Upload
        if: always()
        run: |
          # Give App Store Connect a moment to process the upload
          sleep 10
          echo "Build uploaded. Check App Store Connect > TestFlight > Builds for status."