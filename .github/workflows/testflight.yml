name: Build & Upload to TestFlight — CI pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ASC_KEY: ${{ secrets.ASC_KEY }}
  ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
  ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
  BUNDLE_ID: com.yeziddr.morningvault.dev
  APP_ID: ${{ secrets.APP_ID }}
  CERT_P12: ${{ secrets.CERT_P12 }}
  CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
  PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump build number
        run: |
          NEXT=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEXT/" MorningVault.xcodeproj/project.pbxproj || true
          echo "Build number set to: $NEXT"

      - name: Resolve SPM dependencies
        run: xcodebuild -project MorningVault.xcodeproj -scheme MorningVault -resolvePackageDependencies

      - name: Import signing assets
        run: |
          # Decode and install certificate
          echo "$CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -P "$CERT_PASSWORD" -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign 2>/dev/null || \
          security import cert.p12 -P "$CERT_PASSWORD" -k /Users/runner/Library/Keychains/temp.keychain -T /usr/bin/codesign

          # Decode and install provisioning profile
          echo "$PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          # Verify
          security find-identity -vp codesigning | grep -v "valid identities"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build for App Store (Archive) with manual signing
        run: |
          rm -rf build/MorningVault.xcarchive

          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MorningVault.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution: Yezid Rodriguez (8ZPN58AQLD)" \
            DEVELOPMENT_TEAM=8ZPN58AQLD \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            2>&1

      - name: Package IPA from archive
        run: |
          ARCHIVE="build/MorningVault.xcarchive"
          APP="$ARCHIVE/Products/Applications/MorningVault.app"

          ls "$APP" || exit 1
          ls "$APP/embedded.mobileprovision" || { echo "ERROR: No embedded.mobileprovision!"; exit 1; }

          mkdir -p Payload
          cp -R "$APP" Payload/MorningVault.app

          rm -f build/MorningVault.ipa
          cd Payload
          zip -r ../build/MorningVault.ipa MorningVault.app
          cd ..

          echo "IPA created:"
          ls -lh build/MorningVault.ipa

      - name: Upload to TestFlight
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file build/MorningVault.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            2>&1

      - name: Verify Upload
        if: always()
        run: |
          sleep 10
          echo "Build uploaded. Check App Store Connect > TestFlight > Builds."