name: MorningVault Build & TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Round 8 — confirm: PROVISIONING_PROFILE is the missing/bad secret.
# CERT_P12 (round 6) and CERT_PASSWORD (round 7) are both clean.

jobs:
  build:
    runs-on: macos-15
    env:
      DEVICE: "platform=iOS Simulator,name=iPhone 16 Pro"
      SCHEME: MorningVault
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: .

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build for iOS Simulator
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme $SCHEME \
            -configuration Debug \
            -destination "$DEVICE" \
            -derivedDataPath ./DerivedData \
            build CODE_SIGN_STYLE=Automatic CODE_SIGNING_ALLOWED=NO
        working-directory: .

  build-and-upload:
    runs-on: macos-15
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Round 8 — test PROVISIONING_PROFILE alone
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          echo "PROVISIONING_PROFILE length: ${#PROVISIONING_PROFILE}"
          [ -n "$PROVISIONING_PROFILE" ] && echo "PROVISIONING_PROFILE is set" || echo "PROVISIONING_PROFILE is EMPTY"
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision 2>&1 || echo "DECODE FAILED"
          ls -la /tmp/profile.mobileprovision 2>/dev/null || true

      - name: Round 8 marker
        if: always()
        run: echo "round 8 reached at $(date)"
