name: Build & TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEVICE: "platform=iOS Simulator,name=iPhone 16 Pro"
  SCHEME: MorningVault
  PROVISIONING_PROFILE_NAME: MorningVault-AppStore

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: .

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build for iOS Simulator
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme $SCHEME \
            -configuration Debug \
            -destination "$DEVICE" \
            -derivedDataPath ./DerivedData \
            build CODE_SIGN_STYLE=Automatic CODE_SIGNING_ALLOWED=NO
        working-directory: .

      - name: Build for App Store (Archive)
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create Keychain
          security create-keychain -p "" build-keychain
          security set-keychain-settings build-keychain
          security unlock-keychain -p "" build-keychain

          # Import certificate
          echo "$CERTIFICATE_BASE64" | base64 -d > certificate.p12
          security import certificate.p12 -P "$CERTIFICATE_PASSWORD" -t cert -f pkcs12 -k build-keychain -k build-keychain
          security set-key-partition-list -S apple-tool:,apple: -k "" build-keychain
          rm certificate.p12

          # Write provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/MorningVault-AppStore.mobileprovision

          # Set code sign identity
          CODE_SIGN_IDENTITY="Apple Distribution: Yezid Rodriguez (8ZPN58AQLD)"

          # Build archive
          xcodebuild -project MorningVault.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/MorningVault.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE="$PROVISIONING_PROFILE_NAME"
        working-directory: .