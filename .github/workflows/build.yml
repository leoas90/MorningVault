name: Build

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
    branches: [main, master]

env:
  TEAM_ID: Z8ZPN58AQLD
  ASC_KEY_ID: 7W72CN4J29
  BUNDLE_ID: com.yeziddr.morningvault.dev

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump build number
        run: |
          NEXT=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEXT/g" MorningVault.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = 8ZPN58AQLD/DEVELOPMENT_TEAM = Z8ZPN58AQLD/g" MorningVault.xcodeproj/project.pbxproj
          echo "Build number set to: $NEXT"

      - name: Resolve SPM dependencies
        run: xcodebuild -project MorningVault.xcodeproj -scheme MorningVault -resolvePackageDependencies

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone" | head -10

      - name: Build iOS Simulator
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=3AA4FC23-17DE-49CF-8D07-DECAFCDD7323' \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

  testflight:
    runs-on: macos-14
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          test -s ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Bump build number and fix team id
        run: |
          NEXT=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEXT/g" MorningVault.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = 8ZPN58AQLD/DEVELOPMENT_TEAM = Z8ZPN58AQLD/g" MorningVault.xcodeproj/project.pbxproj
          echo "Build number set to: $NEXT"
          grep -n "CURRENT_PROJECT_VERSION\|DEVELOPMENT_TEAM\|PRODUCT_BUNDLE_IDENTIFIER" MorningVault.xcodeproj/project.pbxproj | head -30

      - name: Resolve SPM dependencies
        run: xcodebuild -project MorningVault.xcodeproj -scheme MorningVault -resolvePackageDependencies

      - name: Build signed archive for TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Release \
            -archivePath build/MorningVault.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            archive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" 2>&1 | tee archive.log

      - name: Create export options
        run: |
          mkdir -p build
          cat > build/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          EOF
          plutil -lint build/exportOptions.plist

      - name: Export signed IPA
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MorningVault.xcarchive \
            -exportPath build \
            -exportOptionsPlist build/exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" 2>&1 | tee export.log
          ls -lah build

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(find build -name "*.ipa" -maxdepth 2 | head -1)
          test -n "$IPA"
          echo "Uploading $IPA"
          xcrun altool --upload-app \
            -t ios \
            -f "$IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --wait-processing

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-logs
          path: |
            archive.log
            export.log
            build/exportOptions.plist
          retention-days: 3

      - name: Notify success
        run: |
          echo "✅ Signed TestFlight upload complete"
          echo "Build: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
