name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v4

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone" | head -10

      - name: Build iOS
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=3AA4FC23-17DE-49CF-8D07-DECAFCDD7323' \
            build 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

  archive:
    runs-on: macos-14
    needs: build

    steps:
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build archive
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Release \
            -archivePath build/MorningVault.xcarchive \
            archive

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: MorningVault-archive
          path: build/MorningVault.xcarchive