name: MorningVault Build & TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Round 6 — bisect secrets in Import signing assets.
# Try each secret individually. The first that doesn't cause startup_failure
# confirms the OTHER ones are the trigger.

jobs:
  build:
    runs-on: macos-15
    env:
      DEVICE: "platform=iOS Simulator,name=iPhone 16 Pro"
      SCHEME: MorningVault
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: .

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build for iOS Simulator
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme $SCHEME \
            -configuration Debug \
            -destination "$DEVICE" \
            -derivedDataPath ./DerivedData \
            build CODE_SIGN_STYLE=Automatic CODE_SIGNING_ALLOWED=NO
        working-directory: .

  build-and-upload:
    runs-on: macos-15
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Round 6 — test CERT_P12 only
        env:
          CERT_P12: ${{ secrets.CERT_P12 }}
        run: |
          echo "CERT_P12 length: ${#CERT_P12}"
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12 2>&1 || echo "DECODE FAILED"
          ls -la /tmp/cert.p12
          file /tmp/cert.p12

      - name: Round 6 marker
        if: always()
        run: echo "round 6 reached at $(date)"
