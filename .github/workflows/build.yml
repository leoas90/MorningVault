name: MorningVault Build & TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Round 7 — test CERT_PASSWORD alone. CERT_P12 was clean (round 6).

jobs:
  build:
    runs-on: macos-15
    env:
      DEVICE: "platform=iOS Simulator,name=iPhone 16 Pro"
      SCHEME: MorningVault
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: .

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build for iOS Simulator
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme $SCHEME \
            -configuration Debug \
            -destination "$DEVICE" \
            -derivedDataPath ./DerivedData \
            build CODE_SIGN_STYLE=Automatic CODE_SIGNING_ALLOWED=NO
        working-directory: .

  build-and-upload:
    runs-on: macos-15
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Round 7 — test CERT_PASSWORD alone
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          echo "CERT_PASSWORD length: ${#CERT_PASSWORD}"
          [ -n "$CERT_PASSWORD" ] && echo "CERT_PASSWORD is set" || echo "CERT_PASSWORD is EMPTY"

      - name: Round 7 marker
        if: always()
        run: echo "round 7 reached at $(date)"
