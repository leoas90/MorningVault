name: MorningVault Build & TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Round 4 — bisect: add only the no-secret steps back.
# If this still startup_fails, the cause is NOT in any of these steps
# (Bump build number, Resolve SPM deps, Package IPA, Verify Upload).
# If it succeeds, we then add Import signing assets, Build Archive, Upload TF
# one at a time to find the secret-causing step.

jobs:
  build:
    runs-on: macos-15
    env:
      DEVICE: "platform=iOS Simulator,name=iPhone 16 Pro"
      SCHEME: MorningVault
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: .

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build for iOS Simulator
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme $SCHEME \
            -configuration Debug \
            -destination "$DEVICE" \
            -derivedDataPath ./DerivedData \
            build CODE_SIGN_STYLE=Automatic CODE_SIGNING_ALLOWED=NO
        working-directory: .

  build-and-upload:
    runs-on: macos-15
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump build number
        run: |
          NEXT=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEXT/" MorningVault.xcodeproj/project.pbxproj || true
          echo "Build number set to: $NEXT"

      - name: Resolve SPM dependencies
        run: xcodebuild -project MorningVault.xcodeproj -scheme MorningVault -resolvePackageDependencies

      # NO Import signing assets in this round
      # NO Build for App Store (Archive) in this round
      # NO Package IPA in this round
      # NO Upload to TestFlight in this round

      - name: Round 4 marker — no-secret steps only
        if: always()
        run: |
          echo "build-and-upload round 4 reached at $(date)"
