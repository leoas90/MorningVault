name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve SPM dependencies
        run: xcodebuild -project MorningVault.xcodeproj -scheme MorningVault -resolvePackageDependencies

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone" | head -10

      - name: Build iOS
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=3AA4FC23-17DE-49CF-8D07-DECAFCDD7323' \
            build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

  # TestFlight upload — only on git tags (e.g., v1.0.0)
  testflight:
    runs-on: macos-14
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directory for private key
        run: mkdir -p ~/.appstoreconnect/private_keys

      - name: Download private key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          echo "$ASC_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_7W72CN4J29.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_7W72CN4J29.p8

      - name: Build archive for TestFlight
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Release \
            -archivePath build/MorningVault.xcarchive \
            archive CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Upload to TestFlight
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          xcrun altool --upload-app \
            -t ios \
            -f build/MorningVault.xcarchive \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --type macos \
            --wait-processing

      - name: Notify success
        run: |
          echo "✅ TestFlight upload complete!"
          echo "Build: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"