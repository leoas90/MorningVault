name: MorningVault Build & TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Workflow-level env block retained (round 1 proved it wasn't the cause of
# startup_failure). The actual cause was a missing/bad PROVISIONING_PROFILE
# secret — fixed in commit history via bisect rounds #116-#124.
#
# Once the PROVISIONING_PROFILE secret is re-uploaded on the repo, this
# workflow is the recovery baseline that should run end-to-end.

env:
  DEVICE: "platform=iOS Simulator,name=iPhone 16 Pro"
  SCHEME: MorningVault
  ASC_KEY: ${{ secrets.ASC_KEY }}
  ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
  ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
  BUNDLE_ID: com.yeziddr.morningvault.dev
  APP_ID: ${{ secrets.APP_ID }}
  CERT_P12: ${{ secrets.CERT_P12 }}
  CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
  PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: .

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build for iOS Simulator
        run: |
          xcodebuild -project MorningVault.xcodeproj \
            -scheme $SCHEME \
            -configuration Debug \
            -destination "$DEVICE" \
            -derivedDataPath ./DerivedData \
            build CODE_SIGN_STYLE=Automatic CODE_SIGNING_ALLOWED=NO
        working-directory: .

  build-and-upload:
    runs-on: macos-15
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear derived data
        run: |
          # Wipe DerivedData from any previous build on this runner. The macOS
          # runner image is fresh per job, but if GitHub reuses an image
          # mid-job (e.g., a cancelled-then-restarted run), stale DerivedData
          # can survive and cause xcodebuild to use cached signing decisions
          # from a previous (failed) run. Wipe it to be safe.
          rm -rf ~/Library/Developer/Xcode/DerivedData/MorningVault-*
          echo "DerivedData cleared"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: .

      - name: Bump build number
        run: |
          NEXT=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEXT/" MorningVault.xcodeproj/project.pbxproj || true
          echo "Build number set to: $NEXT"

      - name: Resolve SPM dependencies
        run: xcodebuild -project MorningVault.xcodeproj -scheme MorningVault -resolvePackageDependencies

      - name: Install xcbeautify (optional)
        # Pretty-prints xcodebuild output. If brew install fails, we fall back
        # to raw xcodebuild output via the `|| true` trick — never blocks.
        run: |
          if brew install xcbeautify 2>/dev/null; then
            echo "xcbeautify installed"
          else
            echo "xcbeautify install failed — will use raw xcodebuild output"
          fi
          which xcbeautify || echo "xcbeautify not on PATH"

      - name: Import signing assets
        run: |
          echo "$CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -P "$CERT_PASSWORD" -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign 2>/dev/null || \
          security import cert.p12 -P "$CERT_PASSWORD" -k /Users/runner/Library/Keychains/temp.keychain -T /usr/bin/codesign

          echo "$PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Wipe any stale profiles from previous runner runs. xcodebuild picks
          # the "best matching" profile by name, and a stale one with a name
          # xcodebuild likes will win over our fresh one. Only keep what THIS
          # run installs.
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*

          # Install under BOTH the profile's internal Name and its UUID.
          # xcodebuild locates profiles by filename — either Name or UUID works,
          # but the filename must match the profile's internal Name exactly, and
          # the UUID-named copy must match the profile's actual UUID. Reading
          # these dynamically means we don't break on profile regeneration
          # (different cert → different UUID/Name).
          PROFILE_NAME=$(security cms -D -i profile.mobileprovision 2>/dev/null | plutil -extract Name raw -)
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
          echo "Profile Name: $PROFILE_NAME"
          echo "Profile UUID: $PROFILE_UUID"
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_NAME}.mobileprovision
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

          # Sanity check: parse the installed copy and confirm capabilities
          echo "--- Profile verification ---"
          INSTALLED=~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_NAME}.mobileprovision
          security cms -D -i "$INSTALLED" 2>/dev/null | plutil -extract Entitlements xml1 -o - - 2>/dev/null | grep -E "healthkit|weatherkit" | head -5
          echo "--- End verification ---"

          security find-identity -vp codesigning | grep -v "valid identities"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build for App Store (Archive)
        run: |
          rm -rf build/MorningVault.xcarchive

          # Pipe through xcbeautify if available, otherwise raw output.
          # xcbeautify is optional — its absence doesn't fail the build.
          # We disable pipefail for the pipeline because xcbeautify can exit
          # non-zero on build errors (it highlights them), but we want the
          # build's exit code to drive the workflow. If xcbeautify itself
          # crashes, we fall back to raw output.
          set +o pipefail
          XCB='cat'
          if command -v xcbeautify >/dev/null 2>&1; then
            XCB='xcbeautify'
            echo "Using xcbeautify for pretty output"
          else
            echo "xcbeautify not available, using raw output"
          fi

          xcodebuild -project MorningVault.xcodeproj \
            -scheme MorningVault \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MorningVault.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution: Yezid Rodriguez (8ZPN58AQLD)" \
            DEVELOPMENT_TEAM=8ZPN58AQLD \
            PROVISIONING_PROFILE_SPECIFIER=MorningVaultAppStores \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            -allowProvisioningUpdates \
            2>&1 | $XCB
          BUILD_RC=${PIPESTATUS[0]}
          set -o pipefail
          echo "xcodebuild exit code: $BUILD_RC"
          exit $BUILD_RC

      - name: Package IPA from archive
        run: |
          ARCHIVE="build/MorningVault.xcarchive"
          APP="$ARCHIVE/Products/Applications/MorningVault.app"

          ls "$APP" || exit 1
          ls "$APP/embedded.mobileprovision" || { echo "ERROR: No embedded.mobileprovision!"; exit 1; }

          mkdir -p Payload
          cp -R "$APP" Payload/MorningVault.app

          rm -f build/MorningVault.ipa
          cd Payload
          zip -r ../build/MorningVault.ipa MorningVault.app
          cd ..

          echo "IPA created:"
          ls -lh build/MorningVault.ipa

      - name: Upload to TestFlight
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file build/MorningVault.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            2>&1

      - name: Verify Upload
        if: always()
        run: |
          sleep 10
          echo "Build uploaded. Check App Store Connect > TestFlight > Builds."
