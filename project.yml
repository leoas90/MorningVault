name: MorningVault
options:
  deploymentTarget:
    iOS: "18.5"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "8ZPN58AQLD"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    PROVISIONING_PROFILE_SPECIFIER: "MorningVaultAppStores"

targets:
  MorningVault:
    type: application
    platform: iOS
    sources:
      - path: MorningVault
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yeziddr.morningvault.dev
        PRODUCT_NAME: MorningVault
        INFOPLIST_KEY_CFBundleDisplayName: MorningVault
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 28
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MorningVault/Info.plist
        ALWAYS_SEARCH_USER_PATHS: NO
    entitlements:
      path: MorningVault/MorningVault.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        com.apple.developer.weatherkit: true
        com.apple.security.application-groups:
          - group.com.morningvault.app
    dependencies:
      - sdk: HealthKit.framework
      - sdk: EventKit.framework
      - sdk: CoreLocation.framework
      - sdk: WeatherKit.framework
      - sdk: Contacts.framework

schemes:
  MorningVault:
    build:
      targets:
        MorningVault: all
    run:
      config: Debug
    archive:
      config: Release